name: docs-drift
description: Detect documentation drift in CI
inputs:
  config:
    description: Path to docs-drift config
    required: false
    default: docs-drift.yml
  format:
    description: Report format for CLI output
    required: false
    default: text
  fail-on:
    description: Comma-separated issue kinds that should fail the job
    required: false
    default: missing_in_source,parse_error
runs:
  using: node20
  main: dist/index.js
